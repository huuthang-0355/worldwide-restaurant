# Production Configuration
# These settings are used when SPRING_PROFILES_ACTIVE=prod

# Server Configuration
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# Spring Application Name
spring.application.name=RestaurantBackend

# Database Configuration (Neon PostgreSQL)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Email Configuration
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=2525
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# MoMo Payment Configuration
momo.partner-code=${MOMO_PARTNER_CODE}
momo.access-key=${MOMO_ACCESS_KEY}
momo.secret-key=${MOMO_SECRET_KEY}
momo.endpoint=https://test-payment.momo.vn/v2/gateway/api/create
momo.redirect-url=${FRONTEND_URL:http://localhost:5173}/payment/result
momo.ipn-url=${BACKEND_URL:https://ineptly-lonelier-charlie.ngrok-free.dev}/api/payments/momo/callback
momo.request-type=captureWallet
momo.auto-capture=true
momo.lang=en

# Payment config
payment.timeout-minutes=15
payment.currency=VND

# App Configuration
app.frontend-url=${FRONTEND_URL}
app.email.from=${APP_EMAIL_FROM}
app.email.from-name=Smart Restaurant

# Token Expiration (Hours)
app.token.verification-expiry-hours=24
app.token.password-reset-expiry-hours=1

# Accept case-insensitive enum values in JSON
spring.jackson.mapper.accept-case-insensitive-enums=true

# QR Code Configuration
app.qr.secret=${QR_SECRET_KEY}
app.qr.base-url=${FRONTEND_URL}/menu
app.restaurant.name=Worldwide Restaurant

# Restaurant business rules
restaurant.tax-rate=0.10
restaurant.service-charge-rate=0.05

# Logging
logging.level.root=INFO
logging.level.com.example.RestaurantBackend=INFO
logging.level.org.hibernate.SQL=WARN
