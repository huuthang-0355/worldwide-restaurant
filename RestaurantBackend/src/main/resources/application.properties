spring.application.name=RestaurantBackend

# Database connection
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JDBC driver
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Brevo SMTP Configuration
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# App Configuration
app.frontend-url=${FRONTEND_URL}
app.email.from=${APP_EMAIL_FROM}
app.email.from-name=Smart Restaurant

# Token Expiration (Hours)
app.token.verification-expiry-hours=24
app.token.password-reset-expiry-hours=1

# JWT key
jwt.secret=${JWT_SECRET}

# Accept case-insensitive enum values in JSON
spring.jackson.mapper.accept-case-insensitive-enums=true

# QR Code Configuration
app.qr.secret=${QR_SECRET_KEY}
app.qr.base-url=${app.frontend-url}/menu
app.restaurant.name=Worldwide Restaurant

# MoMo integration
momo.partner-code=${MOMO_PARTNER_CODE}
momo.access-key=${MOMO_ACCESS_KEY}
momo.secret-key=${MOMO_SECRET_KEY}
momo.endpoint=https://test-payment.momo.vn/v2/gateway/api/create
momo.query-endpoint=https://test-payment.momo.vn/v2/gateway/api/query
momo.redirect-url=${FRONTEND_URL}/payment/result
momo.ipn-url=${BACKEND_URL}/api/payments/momo/callback
momo.request-type=captureWallet
momo.auto-capture=true
momo.lang=en

# Payment config
payment.timeout-minutes=15
payment.currency=VND

# Restaurant business rules
restaurant.tax-rate=0.10
restaurant.service-charge-rate=0.05